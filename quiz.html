<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — QuizForge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="quiz-player">
    <div id="quiz-loading" class="loading-overlay">
      <div class="spinner" style="width:36px;height:36px;border-width:4px;"></div>
      <p style="color:var(--text-secondary);">Loading quiz…</p>
    </div>
    <div id="quiz-error" style="display:none;min-height:100vh;" class="flex-center">
      <div style="text-align:center;padding:3rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">😕</div>
        <h2>Quiz not found</h2>
        <p style="margin:0.5rem 0 1.5rem;">This quiz link may be invalid or expired.</p>
        <a href="index.html" class="btn btn-primary">← Back to Home</a>
      </div>
    </div>
    <div id="quiz-header" class="quiz-player-header" style="display:none;">
      <div class="theme-toggle" style="margin-right:auto;">
        <label class="toggle-switch"><input type="checkbox" class="dark-toggle-input" /><span class="toggle-slider"></span></label>
      </div>
      <div style="flex:1;min-width:0;">
        <div class="flex-between" style="margin-bottom:0.35rem;">
          <span id="question-counter" style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);"></span>
          <span id="quiz-title-header" style="font-size:0.8rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;"></span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%;"></div></div>
      </div>
      <div class="timer-circle" id="timer-wrap">
        <svg viewBox="0 0 58 58" width="64" height="64">
          <circle class="timer-bg" cx="29" cy="29" r="26"/>
          <circle class="timer-fill" id="timer-fill" cx="29" cy="29" r="26"/>
        </svg>
        <div class="timer-text" id="timer-text"></div>
      </div>
    </div>
    <div id="quiz-content" style="display:none;flex:1;">
      <div class="quiz-question-card">
        <div class="question-number" id="q-number"></div>
        <div class="question-text" id="q-text"></div>
        <div class="quiz-options" id="quiz-options"></div>
      </div>
      <div class="quiz-nav">
        <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="script.js"></script>
  <script>
    let quiz = null, questions = [], currentIndex = 0, answers = [], timerInterval = null, timeLeft = 0;
    const CIRCUMFERENCE = 2 * Math.PI * 26;

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(location.search);
      const quizId = params.get('id');
      if (!quizId) { showError(); return; }
      const { data: quizData, error: qErr } = await getQuiz(quizId);
      if (qErr || !quizData) { showError(); return; }
      const { data: qs, error: qsErr } = await getQuizQuestions(quizId);
      if (qsErr || !qs || qs.length === 0) { showError('No questions found for this quiz.'); return; }
      quiz = quizData; questions = qs; answers = new Array(questions.length).fill(null);
      document.title = quiz.title + ' — QuizForge';
      document.getElementById('quiz-title-header').textContent = quiz.title;
      document.getElementById('quiz-loading').style.display = 'none';
      document.getElementById('quiz-header').style.display = 'flex';
      document.getElementById('quiz-content').style.display = 'block';
      renderQuestion(0);
    });

    function showError(msg) {
      document.getElementById('quiz-loading').style.display = 'none';
      document.getElementById('quiz-error').style.display = 'flex';
      if (msg) document.getElementById('quiz-error').querySelector('p').textContent = msg;
    }

    function renderQuestion(index) {
      const q = questions[index];
      document.getElementById('question-counter').textContent = `${index + 1} / ${questions.length}`;
      document.getElementById('progress-fill').style.width = ((index / questions.length) * 100) + '%';
      document.getElementById('q-number').textContent = `Question ${index + 1}`;
      document.getElementById('q-text').textContent = q.question_text;
      const opts = [{ key:'A', text:q.option_a },{ key:'B', text:q.option_b },{ key:'C', text:q.option_c },{ key:'D', text:q.option_d }];
      document.getElementById('quiz-options').innerHTML = opts.map(o => `
        <button class="quiz-option ${answers[index] === o.key ? 'selected' : ''}"
          onclick="selectAnswer('${o.key}')" id="opt-${o.key}" ${answers[index] !== null ? 'disabled' : ''}>
          <span class="option-indicator">${o.key}</span>
          <span>${o.text}</span>
        </button>`).join('');
      document.getElementById('next-btn').textContent = index === questions.length - 1 ? 'Submit Quiz ✓' : 'Next →';
      clearTimer();
      if (quiz.timer_seconds > 0) { document.getElementById('timer-wrap').style.visibility = 'visible'; startTimer(quiz.timer_seconds); }
      else document.getElementById('timer-wrap').style.visibility = 'hidden';
    }

    function selectAnswer(key) {
      if (answers[currentIndex] !== null) return;
      answers[currentIndex] = key;
      const q = questions[currentIndex];
      ['A','B','C','D'].forEach(k => {
        const btn = document.getElementById('opt-' + k);
        if (!btn) return;
        btn.disabled = true;
        if (k === q.correct_option) btn.classList.add('correct');
        else if (k === key) btn.classList.add('wrong');
      });
    }

    function nextQuestion() {
      clearTimer();
      if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(currentIndex); }
      else submitQuiz();
    }

    async function submitQuiz() {
      let score = 0;
      questions.forEach((q, i) => { if (answers[i] === q.correct_option) score++; });
      const percentage = Math.round((score / questions.length) * 100);
      await saveResponse(quiz.id, score, questions.length, percentage);
      const params = new URLSearchParams({ score, total: questions.length, percentage, title: quiz.title, answers: JSON.stringify(answers), correct: JSON.stringify(questions.map(q => q.correct_option)) });
      window.location.href = `result.html?${params.toString()}`;
    }

    function startTimer(seconds) {
      timeLeft = seconds; updateTimerUI(seconds, seconds);
      timerInterval = setInterval(() => { timeLeft--; updateTimerUI(timeLeft, seconds); if (timeLeft <= 0) { clearTimer(); nextQuestion(); } }, 1000);
    }

    function updateTimerUI(remaining, total) {
      const el = document.getElementById('timer-text');
      const fill = document.getElementById('timer-fill');
      if (el) el.textContent = remaining;
      if (fill) {
        fill.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / total);
        fill.style.stroke = remaining <= 5 ? 'var(--danger)' : remaining <= total * 0.33 ? 'var(--warning)' : 'var(--accent)';
      }
    }

    function clearTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
  </script>
</body>
</html>
