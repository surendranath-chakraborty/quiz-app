<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — QuizForge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card animate-in" style="position:relative;">
      <div class="card-body">
        <div class="auth-header">
          <div class="auth-logo">Quiz<span>Forge</span></div>
          <p style="font-size:0.9rem;">Your smart quiz creation platform</p>
        </div>

        <div style="position:absolute;top:1.25rem;right:1.25rem;">
          <label class="toggle-switch" title="Toggle dark mode">
            <input type="checkbox" class="dark-toggle-input" />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
          <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="auth-alert"></div>

        <!-- Login Form -->
        <form id="login-form" class="stack stack-2" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="login-email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" id="login-password" type="password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary" id="login-btn">Login to Dashboard</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" class="stack stack-2" style="display:none;" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="signup-email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" id="signup-password" type="password" placeholder="Min. 6 characters" minlength="6" required />
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input class="form-input" id="signup-confirm" type="password" placeholder="Repeat password" required />
          </div>
          <button type="submit" class="btn btn-primary" id="signup-btn">Create Free Account</button>
        </form>

        <p style="text-align:center;font-size:0.8rem;margin-top:1rem;color:var(--text-muted);">
          <a href="index.html">← Back to home</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="script.js"></script>
  <script>
    (async () => {
      const user = await getCurrentUser();
      if (user) window.location.href = 'dashboard.html';
    })();

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-signup').classList.toggle('active', !isLogin);
      document.getElementById('login-form').style.display = isLogin ? '' : 'none';
      document.getElementById('signup-form').style.display = isLogin ? 'none' : '';
      document.getElementById('auth-alert').innerHTML = '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Logging in…';
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { error } = await signIn(email, password);
      if (error) {
        // Make Firebase errors beginner-friendly
        let msg = error.message;
        if (error.code === 'auth/user-not-found') msg = 'No account found with this email.';
        if (error.code === 'auth/wrong-password') msg = 'Wrong password. Please try again.';
        if (error.code === 'auth/invalid-email') msg = 'Please enter a valid email address.';
        if (error.code === 'auth/too-many-requests') msg = 'Too many attempts. Please wait a moment.';
        if (error.code === 'auth/invalid-credential') msg = 'Wrong email or password.';
        showAlert('auth-alert', msg, 'error');
        btn.disabled = false;
        btn.textContent = 'Login to Dashboard';
      } else {
        showAlert('auth-alert', 'Welcome back! Redirecting…', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      if (password !== confirm) { showAlert('auth-alert', 'Passwords do not match.', 'error'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account…';
      const { error } = await signUp(email, password);
      if (error) {
        let msg = error.message;
        if (error.code === 'auth/email-already-in-use') msg = 'An account with this email already exists.';
        if (error.code === 'auth/weak-password') msg = 'Password must be at least 6 characters.';
        showAlert('auth-alert', msg, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Free Account';
      } else {
        showAlert('auth-alert', '✓ Account created! Redirecting…', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      }
    }
  </script>
</body>
</html>
